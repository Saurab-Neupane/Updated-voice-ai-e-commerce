<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - AIShop | Review Your Items</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Review your shopping cart. Free shipping on orders over £50. Secure checkout with voice-powered convenience. Easy cart management with AI assistant.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://aishop.com/cart.html">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Shopping Cart - AIShop">
  <meta property="og:description" content="Review your cart and proceed to secure checkout.">
  <meta property="og:url" content="https://aishop.com/cart.html">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .main-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #64748b;
      font-weight: 600;
      transition: all 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #2563eb;
    }

    .header-icons {
      display: flex;
      gap: 1rem;
    }

    .mobile-menu-btn {
      display: none;
    }

    .header-icon-btn {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      position: relative;
      transition: all 0.3s;
    }

    .header-icon-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      font-size: 0.7rem;
      padding: 0.25rem 0.5rem;
      border-radius: 10px;
      border: 2px solid white;
    }

    .page-header {
      text-align: center;
      padding: 4rem 2rem 2rem;
    }

    .page-header h1 {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #1e40af, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .cart-container {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.5rem;
    }

    .cart-items {
      background: white;
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: 0 3px 16px rgba(0, 0, 0, 0.04);
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid #e2e8f0;
    }

    .cart-count {
      font-size: 1.3rem;
      font-weight: 800;
      color: #1e293b;
    }

    .clear-cart-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .clear-cart-btn:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    .cart-item {
      display: flex;
      gap: 1.1rem;
      padding: 1.1rem;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      margin-bottom: 0.85rem;
      transition: all 0.3s;
    }

    .cart-item:hover {
      border-color: #2563eb;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.1);
    }

    .cart-item-image {
      width: 110px;
      height: 110px;
      object-fit: cover;
      border-radius: 12px;
    }

    .cart-item-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .cart-item-name {
      font-size: 1rem;
      font-weight: 800;
      color: #1e293b;
    }

    .cart-item-price {
      font-size: 1.1rem;
      font-weight: 900;
      color: #2563eb;
    }

    .cart-item-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f1f5f9;
      border-radius: 12px;
      padding: 0.5rem;
    }

    .quantity-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: white;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      color: #2563eb;
      transition: all 0.2s;
    }

    .quantity-btn:hover {
      background: #2563eb;
      color: white;
    }

    .quantity-display {
      min-width: 40px;
      text-align: center;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .remove-item-btn {
      background: #fef2f2;
      color: #ef4444;
      border: 2px solid #fecaca;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .remove-item-btn:hover {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }

    .order-summary {
      position: sticky;
      top: 100px;
      height: fit-content;
    }

    .summary-card {
      background: white;
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .summary-title {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: 1.25rem;
      color: #1e293b;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid #e2e8f0;
      font-weight: 600;
      color: #64748b;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      padding: 1.5rem 0;
      margin-top: 1rem;
      border-top: 2px solid #2563eb;
    }

    .summary-total-label {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1e293b;
    }

    .summary-total-amount {
      font-size: 1.4rem;
      font-weight: 900;
      color: #2563eb;
    }

    .checkout-btn {
      width: 100%;
      padding: 1.1rem;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.125rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: all 0.3s;
    }

    .checkout-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
    }

    .continue-shopping {
      width: 100%;
      padding: 1rem;
      background: white;
      border: 2px solid #cbd5e1;
      color: #1e293b;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s;
    }

    .continue-shopping:hover {
      border-color: #2563eb;
      color: #2563eb;
    }

    .empty-cart {
      text-align: center;
      padding: 6rem 2rem;
      grid-column: 1 / -1;
    }

    .empty-icon {
      font-size: 8rem;
      margin-bottom: 2rem;
      opacity: 0.5;
    }

    .empty-cart h2 {
      font-size: 2.5rem;
      font-weight: 900;
      color: #1e293b;
      margin-bottom: 1rem;
    }

    .empty-cart p {
      font-size: 1.25rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .shop-now-btn {
      padding: 1.25rem 3rem;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 1.125rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s;
    }

    .shop-now-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(37, 99, 235, 0.4);
    }

    .promo-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e2e8f0;
    }

    .promo-input {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .promo-input input {
      flex: 1;
      padding: 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-weight: 600;
    }

    .apply-promo-btn {
      padding: 0.75rem 1.5rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

  
    
    /* Hamburger Menu */
    .hamburger-menu {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      z-index: 1001;
    }
    
    .hamburger-menu span {
      width: 25px;
      height: 3px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 3px;
      transition: all 0.3s ease;
    }
    
    .hamburger-menu.active span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }
    
    .hamburger-menu.active span:nth-child(2) {
      opacity: 0;
    }
    
    .hamburger-menu.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }
    
    .mobile-menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .mobile-menu-overlay.active {
      opacity: 1;
    }

    /* Tablet - 1024px */
    @media (max-width: 1024px) {
      .cart-container {
        grid-template-columns: 1fr;
        padding: 0 1.5rem;
      }

      .order-summary {
        position: static;
        margin-top: 1rem;
      }
    }

    /* Tablet Portrait - 768px */
    @media (max-width: 768px) {
      .main-header {
        padding: 0.875rem 1rem;
      }
      
      .logo {
        font-size: 1.5rem;
      }

      .nav-links {
        position: fixed;
        top: 0;
        right: 0;
        transform: translateX(110%);
        width: 280px;
        height: 100vh;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: 80px 30px 30px;
        gap: 1.5rem;
        box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
        z-index: 1000;
        overflow-y: auto;
      }

      .nav-links.active {
        transform: translateX(0);
      }
      
      .nav-links a {
        font-size: 1.1rem;
        padding: 12px 0;
        border-bottom: 1px solid #e2e8f0;
      }
      
      .hamburger-menu {
        display: flex;
      }
      
      .mobile-menu-overlay {
        display: block;
      }

      .header-icon-btn {
        font-size: 0.8rem;
        padding: 0.625rem 1rem;
      }

      .page-header h1 {
        font-size: 2.5rem;
      }
      
      .cart-container {
        padding: 0 1rem;
      }

      .cart-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
        padding: 1.25rem;
      }

      .cart-item-image {
        width: 100%;
        max-width: 260px;
        height: 200px;
      }
    }
    
    /* Large Mobile - 640px */
    @media (max-width: 640px) {
      .cart-container {
        padding: 0 0.875rem;
      }
      
      .page-header {
        padding: 2rem 1rem 1.5rem;
      }
    }
    
    /* Mobile - 480px */
    @media (max-width: 480px) {
      .logo {
        font-size: 1.35rem;
      }
      
      .main-header {
        padding: 0.75rem 0.875rem;
      }
      
      .page-header h1 {
        font-size: 2rem;
        margin-bottom: 0.75rem;
      }
      
      .page-header p {
        font-size: 1rem;
      }
      
      .cart-item {
        padding: 1rem;
      }
      
      .cart-item-image {
        height: 180px;
      }
      
      .cart-item h3 {
        font-size: 1.1rem;
      }
      
      .cart-item-price {
        font-size: 1.3rem;
      }
    }
    
    /* Small Mobile - 375px */
    @media (max-width: 375px) {
      .logo {
        font-size: 1.2rem;
      }
      
      .page-header h1 {
        font-size: 1.75rem;
      }
      
      .cart-item {
        padding: 0.875rem;
      }
      
      .cart-item-image {
        height: 160px;
      }
    }
  </style>
</head>
<body>

  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="closeMobileMenu()"></div>

  <header class="main-header">
    <div class="logo" onclick="window.location.href='index.html'">🛍️ AIShop</div>

    <div class="hamburger-menu" id="hamburgerMenu" onclick="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html" class="active">Cart</a>
      <a href="wishlist.html">Wishlist</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="header-icons">
      <button class="header-icon-btn" id="themeToggle" title="Change Theme">
        <span style="font-size: 1.3rem;">🎨</span>
      </button>
      <button class="header-icon-btn" id="voiceBtn" title="Voice AI"> 🎤 Voice</button>
      <button class="header-icon-btn" onclick="window.location.href='wishlist.html'">
        Wishlist <span class="badge" id="wishlistCount">0</span>
      </button>
      <button class="header-icon-btn" onclick="window.location.href='cart.html'">
         Cart <span class="badge" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <div class="page-header">
    <h1> Shopping Cart</h1>
    <p style="font-size: 1.25rem; color: #64748b;">Review your items and checkout</p>
  </div>

  <div class="cart-container" id="cartContainer"></div>

  <div id="footerContainer"></div>

  <script src="theme-toggle.js"></script>
  <script src="voice.js"></script>
  <script src="chatbot.js"></script>

  <script>
    function loadCart() {
    
      const cartData = localStorage.getItem('cart');
     
      const cart = JSON.parse(cartData || '[]');
      
      const container = document.getElementById('cartContainer');

      if (!cart || cart.length === 0) {
        console.log(' Cart is empty');
        container.innerHTML = `
          <div class="empty-cart">
            <div class="empty-icon"></div>
            <h2>Your cart is empty</h2>
            <p>Add some amazing products to get started!</p>
            <button class="shop-now-btn" onclick="window.location.href='products.html'">
              Start Shopping
            </button>
          </div>
        `;
        return;
      }

      const subtotal = cart.reduce((sum, item) => {
        const price = Number(item.price) || 0;
        const qty   = Number(item.quantity) || 1;
        return sum + price * qty;
      }, 0);

      const shipping = subtotal > 100 ? 0 : 10;
      const tax = subtotal * 0.08;
      const total = subtotal + shipping + tax;

      container.innerHTML = `
        <div class="cart-items">
          <div class="cart-header">
            <div class="cart-count">
              <span>${cart.reduce((sum, item) => sum + (Number(item.quantity) || 1), 0)}</span> items in cart
            </div>
            <button class="clear-cart-btn" onclick="clearCart()">
               Clear Cart
            </button>
          </div>

          ${cart.map(item => {
            const price = Number(item.price) || 0;
            const qty   = Number(item.quantity) || 1;
            const name  = item.name || 'Item';
            const image = item.image || '';

            return `
              <div class="cart-item">
                <img src="${image}" alt="${name}" class="cart-item-image" loading="lazy"
                     onerror="this.src='https://via.placeholder.com/140?text=${encodeURIComponent(name)}'" />
                
                <div class="cart-item-details">
                  <div class="cart-item-name">${name}</div>
                  <div class="cart-item-price">£${price.toFixed(2)}</div>

                  <div class="cart-item-controls">
                    <div class="quantity-controls">
                      <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${qty - 1})">−</button>
                      <div class="quantity-display">${qty}</div>
                      <button class="quantity-btn" onclick="updateQuantity(${item.id}, ${qty + 1})">+</button>
                    </div>

                    <button class="remove-item-btn" onclick="removeFromCart(${item.id})">
                      ✕ Remove
                    </button>
                  </div>
                </div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="order-summary">
          <div class="summary-card">
            <div class="summary-title">Order Summary</div>

            <div class="summary-row">
              <span>Subtotal</span>
              <span>£${subtotal.toFixed(2)}</span>
            </div>

            <div class="summary-row">
              <span>Shipping</span>
              <span>${shipping === 0 ? 'FREE' : '£' + shipping.toFixed(2)}</span>
            </div>

            <div class="summary-row" style="border-bottom:none; padding-top:0.5rem; color:#047857; font-size:0.9rem;">
              <span>Delivery</span>
              <span>${subtotal > 100 ? 'Free over £100 threshold reached' : 'Free over £100 (currently £' + subtotal.toFixed(2) + ')'}</span>
            </div>

            <div class="summary-row">
              <span>Tax (8%)</span>
              <span>£${tax.toFixed(2)}</span>
            </div>

            <div class="summary-total">
              <div class="summary-total-label">Total</div>
              <div class="summary-total-amount">£${total.toFixed(2)}</div>
            </div>

            <button class="checkout-btn" onclick="checkout()">
              Proceed to Checkout
            </button>

            <button class="continue-shopping" onclick="window.location.href='products.html'">
              ← Continue Shopping
            </button>

            <div class="promo-section">
              <div style="font-weight: 700; color: #64748b;">Have a promo code?</div>
              <div class="promo-input">
                <input type="text" placeholder="Enter code" id="promoInput" />
                <button class="apply-promo-btn" onclick="applyPromo()">Apply</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function updateQuantity(id, newQuantity) {
      if (newQuantity < 1) {
        removeFromCart(id);
        return;
      }

      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const item = cart.find(item => item.id === id);
      
      if (item) {
        item.quantity = Number(newQuantity) || 1;
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
        updateCounts();
        showNotification(' Quantity updated');
      }
    }

    function removeFromCart(id) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart = cart.filter(item => item.id !== id);
      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
      updateCounts();
      showNotification(' Item removed');
    }

    function clearCart() {
      if (confirm('Clear entire cart?')) {
        localStorage.setItem('cart', JSON.stringify([]));
        loadCart();
        updateCounts();
        showNotification(' Cart cleared');
      }
    }

    function checkout() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        showNotification(' Cart is empty!');
        return;
      }
      window.location.href = 'checkout.html';
    }

    function applyPromo() {
      const code = document.getElementById('promoInput').value.trim().toUpperCase();
      if (code === 'SAVE10') {
        showNotification(' 10% discount applied!');
      } else if (code) {
        showNotification(' Invalid code');
      }
    }

    function updateCounts() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
      const cartCount = cart.reduce((sum, item) => sum + (Number(item.quantity) || 1), 0);
      
      const cartBadge = document.getElementById('cartCount');
      const wishlistBadge = document.getElementById('wishlistCount');
      
      if (cartBadge) cartBadge.textContent = cartCount;
      if (wishlistBadge) wishlistBadge.textContent = wishlist.length;
    }

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed; top: 100px; right: 20px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white; padding: 1rem 1.5rem; border-radius: 12px;
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3); z-index: 10000;
        animation: slideIn 0.3s ease-out; font-weight: 700;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadCart();
      updateCounts();

      setTimeout(() => {
        const themeBtn = document.getElementById('themeToggle');
        if (themeBtn && typeof cycleTheme === 'function') {
          themeBtn.addEventListener('click', cycleTheme);
        }

        const voiceBtn = document.getElementById('voiceBtn');
        if (voiceBtn && typeof startVoice === 'function') {
          voiceBtn.addEventListener('click', startVoice);
        }
      }, 100);
    });

    function toggleMobileMenu() {
      const navLinks = document.getElementById('navLinks');
      const hamburger = document.getElementById('hamburgerMenu');
      const overlay = document.getElementById('mobileMenuOverlay');
      
      navLinks.classList.toggle('active');
      hamburger.classList.toggle('active');
      overlay.classList.toggle('active');
      
      // Prevent body scroll when menu is open
      document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
    }
    
    function closeMobileMenu() {
      const navLinks = document.getElementById('navLinks');
      const hamburger = document.getElementById('hamburgerMenu');
      const overlay = document.getElementById('mobileMenuOverlay');
      
      navLinks.classList.remove('active');
      hamburger.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }
    
    // Close menu when clicking on a link
    document.addEventListener('DOMContentLoaded', function() {
      const navLinkElements = document.querySelectorAll('.nav-links a');
      navLinkElements.forEach(link => {
        link.addEventListener('click', closeMobileMenu);
      });
    });

    fetch('footer.html')
      .then(response => response.text())
      .then(html => document.getElementById('footerContainer').innerHTML = html)
      .catch(error => console.error('Footer error:', error));
  </script>
</body>
</html>
