<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist - AIShop</title>
  <meta name="description" content="Save products to your AIShop wishlist and move favorites to cart faster with voice-assisted shopping controls.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://aishop.com/wishlist.html">
  <meta name="theme-color" content="#2563eb">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* GLOBAL RESPONSIVE RULES */
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      min-height: 100vh;
      color: #1e293b;
      overflow-x: hidden;
    }

    
    .main-header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #e2e8f0;
    }

    .logo {
      font-size: 1.75rem;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #7c3aed, #db2777);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #64748b;
      font-weight: 600;
      transition: all 0.3s;
      position: relative;
      font-size: 0.95rem;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 0;
      height: 3px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      transition: width 0.3s;
      border-radius: 2px;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #2563eb;
    }

    .nav-links a:hover::after,
    .nav-links a.active::after {
      width: 100%;
    }

    .header-icons {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .mobile-menu-btn {
      display: none;
    }

    .header-icon-btn {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border: none;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      position: relative;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
    }

    .header-icon-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(37, 99, 235, 0.4);
    }

    .header-icon-btn .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      font-size: 0.7rem;
      font-weight: 800;
      padding: 0.25rem 0.5rem;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
      border: 2px solid white;
    }

    .page-header {
      background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
      padding: 4rem 2rem 3rem;
      text-align: center;
      border-bottom: 2px solid #f9a8d4;
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      font-size: 15rem;
      opacity: 0.1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.05); }
    }

    .page-header-content {
      position: relative;
      z-index: 1;
    }

    .page-header p {
      font-size: 1.25rem;
      color: #1e293b;
      font-weight: 600;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }


    .wishlist-section {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 1.5rem 4rem;
      font-size: 1.25rem;
      color: #1e293b;
      font-weight: 600;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }


    .wishlist-section {
      max-width: 1400px;
      margin: 3rem auto;
      padding: 0 2rem 5rem;
    }

    .wishlist-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1.5rem;
    }

    .wishlist-count {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e293b;
    }

    .wishlist-count span {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .wishlist-actions {
      display: flex;
      gap: 1rem;
    }

    .action-btn {
      padding: 0.875rem 1.75rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .action-btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }

    .action-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
    }

    .action-btn-secondary {
      background: white;
      color: #ef4444;
      border: 2px solid #fecaca;
    }

    .action-btn-secondary:hover {
      background: #fef2f2;
      border-color: #ef4444;
    }

    .wishlist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 2rem;
    }

    .wishlist-card {
      background: white;
      border: 2px solid #e2e8f0;
      border-radius: 18px;
      overflow: hidden;
      transition: all 0.3s;
      box-shadow: 0 3px 16px rgba(0, 0, 0, 0.05);
      animation: fadeInUp 0.5s ease-out;
      position: relative;
    }

    .wishlist-card:hover {
      transform: translateY(-10px);
      border-color: #2563eb;
      box-shadow: 0 20px 60px rgba(37, 99, 235, 0.2);
    }

    .wishlist-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: linear-gradient(135deg, #db2777, #ec4899);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-weight: 800;
      font-size: 0.85rem;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
    }

    .wishlist-image-container {
      position: relative;
      height: 240px;
      background: #f8fafc;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .wishlist-image-container:hover {
      transform: scale(1.05);
    }

    .wishlist-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .wishlist-card:hover .wishlist-image {
      transform: scale(1.08);
    }

    .remove-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: white;
      border: 2px solid #e2e8f0;
      height: 45px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      color: #64748b;
    }

    .remove-btn:hover {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border-color: transparent;
      transform: scale(1.1) rotate(90deg);
      color: white;
    }

    .wishlist-info {
      padding: 1.3rem 1.4rem 1.4rem;
    }

    .wishlist-name {
      font-size: 1.05rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 1rem;
      line-height: 1.4;
      transition: color 0.3s ease;
    }

    .wishlist-name:hover {
      color: #2563eb;
    }

    .wishlist-price {
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }

    .wishlist-actions-row {
      display: flex;
      gap: 1rem;
    }

    .cart-btn {
      flex: 1;
      padding: 0.85rem;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .cart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
    }

    .view-btn {
      padding: 0.85rem;
      background: white;
      color: #2563eb;
      border: 2px solid #dbeafe;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }

    .view-btn:hover {
      background: #eff6ff;
      border-color: #2563eb;
    }

    .wishlist-actions-card {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .view-details-btn {
      flex: 1;
      padding: 0.875rem 1.25rem;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.25);
    }

    .view-details-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
    }

    .move-to-cart-btn {
      flex: 1;
      padding: 0.875rem 1.25rem;
      background: white;
      color: #10b981;
      border: 3px solid #d1fae5;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .move-to-cart-btn:hover {
      background: #d1fae5;
      border-color: #10b981;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.2);
    }

    /* Empty State */
    .empty-wishlist {
      text-align: center;
      padding: 5rem 2rem;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .empty-icon {
      font-size: 8rem;
      margin-bottom: 2rem;
      opacity: 0.3;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .empty-wishlist h2 {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    .empty-wishlist p {
      font-size: 1.25rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 2.5rem;
    }

    .browse-btn {
      padding: 1.25rem 3rem;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border: none;
      border-radius: 16px;
      font-weight: 800;
      font-size: 1.125rem;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 30px rgba(37, 99, 235, 0.3);
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
    }

    .browse-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(37, 99, 235, 0.4);
    }

    /* ======================================
       COMPREHENSIVE RESPONSIVE DESIGN
       ====================================== */
    
    .hamburger-menu {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
      z-index: 1001;
    }
    
    .hamburger-menu span {
      width: 25px;
      height: 3px;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      border-radius: 3px;
      transition: all 0.3s ease;
    }
    
    .hamburger-menu.active span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }
    
    .hamburger-menu.active span:nth-child(2) {
      opacity: 0;
    }
    
    .hamburger-menu.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }
    
    .mobile-menu-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .mobile-menu-overlay.active {
      opacity: 1;
    }

    @media (max-width: 1024px) {
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }
    }

    @media (max-width: 768px) {
      .main-header {
        padding: 0.875rem 1rem;
      }
      
      .logo {
        font-size: 1.5rem;
      }

      .nav-links {
        position: fixed;
        top: 0;
        right: 0;
        transform: translateX(110%);
        width: 280px;
        height: 100vh;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(20px);
        flex-direction: column;
        padding: 80px 30px 30px;
        gap: 1.5rem;
        box-shadow: -5px 0 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
        z-index: 1000;
        overflow-y: auto;
      }

      .nav-links.active {
        transform: translateX(0);
      }
      
      .nav-links a {
        font-size: 1.1rem;
        padding: 12px 0;
        border-bottom: 1px solid #e2e8f0;
      }
      
      .hamburger-menu {
        display: flex;
      }
      
      .mobile-menu-overlay {
        display: block;
      }

      .header-icon-btn {
        font-size: 0.8rem;
        padding: 0.625rem 1rem;
      }
      
      .page-header h1 {
        font-size: 2.5rem;
      }
      
      .page-header p {
        font-size: 1rem;
      }
      
      .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.25rem;
      }
    }
    
    @media (max-width: 640px) {
      .products-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      
      .page-header {
        padding: 2rem 1rem 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .logo {
        font-size: 1.35rem;
      }
      
      .main-header {
        padding: 0.75rem 0.875rem;
      }

      .page-header h1 {
        font-size: 2rem;
        margin-bottom: 0.75rem;
      }
      
      .page-header p {
        font-size: 0.95rem;
      }

      .chatbot-container {
        width: 100vw;
        height: 100vh;
        bottom: 0;
        right: 0;
        border-radius: 0;
      }

      #chatbotToggle {
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
      }
    }
    
    @media (max-width: 375px) {
      .logo {
        font-size: 1.2rem;
      }
      
      .page-header h1 {
        font-size: 1.75rem;
      }
      
      .page-header p {
        font-size: 0.875rem;
      }
    }

    @media (max-height: 500px) and (orientation: landscape) {
      .chatbot-container {
        height: 100vh;
      }
    }
  </style>
</head>

<body>
 
  <!-- Mobile Menu Overlay -->
  <div class="mobile-menu-overlay" id="mobileMenuOverlay" onclick="closeMobileMenu()"></div>

  <header class="main-header">
    <div class="logo" onclick="window.location.href='index.html'">🛍️ AIShop</div>

    <div class="hamburger-menu" id="hamburgerMenu" onclick="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="cart.html">Cart</a>
      <a href="wishlist.html" class="active">Wishlist</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="header-icons">
      <button class="header-icon-btn" id="themeToggle" title="Change Theme">
        <span style="font-size: 1.3rem;">Theme</span>
      </button>
      
      <button class="header-icon-btn" id="voiceBtn" title="Voice AI">
      🎤 Voice
      </button>
      
      <button class="header-icon-btn" onclick="window.location.href='wishlist.html'" title="Wishlist">
        Wishlist <span class="badge" id="wishlistCount">0</span>
      </button>
      
      <button class="header-icon-btn" onclick="window.location.href='cart.html'" title="Cart">
        Cart <span class="badge" id="cartCount">0</span>
      </button>
    </div>
  </header>


  <section class="page-header">
    <div class="page-header-content">
      <h1> Your Wishlist</h1>
      <p>Save your favorite items and never lose track of what you love</p>
    </div>
  </section>

  <section class="wishlist-section">
    <div class="wishlist-header" id="wishlistHeader" style="display: none;">
      <div class="wishlist-count">
        <span id="itemCount">0</span> items in your wishlist
      </div>
      <div class="wishlist-actions">
        <button class="action-btn action-btn-primary" onclick="addAllToCart()">
          Add All to Cart
        </button>
        <button class="action-btn action-btn-secondary" onclick="clearWishlist()">
          Clear Wishlist
        </button>
      </div>
    </div>

    <div class="wishlist-grid" id="wishlistGrid">
     
    </div>

    <div class="empty-wishlist" id="emptyWishlist" style="display: none;">
      <div class="empty-icon"></div>
      <h2>Your wishlist is empty</h2>
      <p>Start adding products you love and create your dream collection!</p>
      <button class="browse-btn" onclick="window.location.href='products.html'">
        <span>Browse Products</span>
      </button>
    </div>
  </section>


  <div id="footerContainer"></div>


  <script src="theme-toggle.js"></script>
  <script src="voice.js"></script>
  <script src="chatbot.js"></script>

  <script>
    function loadWishlist() {
      const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
      const grid = document.getElementById('wishlistGrid');
      const emptyState = document.getElementById('emptyWishlist');
      const header = document.getElementById('wishlistHeader');
      const itemCount = document.getElementById('itemCount');

      if (wishlist.length === 0) {
        grid.style.display = 'none';
        header.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }

      grid.style.display = 'grid';
      header.style.display = 'flex';
      emptyState.style.display = 'none';
      itemCount.textContent = wishlist.length;

      grid.innerHTML = wishlist.map(item => `
        <div class="wishlist-card">
          <div class="wishlist-badge">Saved</div>
          
          <div class="wishlist-image-container">
            <button class="remove-btn" onclick="removeFromWishlist(${item.id})" title="Remove from wishlist">
              ✕
            </button>
              <img src="${item.image}" alt="${item.name}" class="wishlist-image" loading="lazy"
                onerror="this.src='https://via.placeholder.com/400x300?text=${encodeURIComponent(item.name)}'" />
          </div>

          <div class="wishlist-info">
            <div class="wishlist-name">${item.name}</div>
            <div class="wishlist-price">£${item.price.toFixed(2)}</div>

            <div class="wishlist-actions-row">
              <button class="cart-btn" onclick="moveToCart(${item.id}, '${item.name}', ${item.price}, '${item.image}')">
                Add to Cart
              </button>
              <button class="view-btn" onclick="viewProduct(${item.id})" title="View Product">
                👁️
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function removeFromWishlist(id) {
      let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
      wishlist = wishlist.filter(item => item.id !== id);
      localStorage.setItem('wishlist', JSON.stringify(wishlist));
      loadWishlist();
      updateCounts();
      showNotification(' Removed from wishlist');
    }

    function moveToCart(id, name, price, image) {

      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const existingItem = cart.find(item => item.id === id);

      if (existingItem) {
        existingItem.quantity += 1;
      } else {
        cart.push({ id, name, price, image, quantity: 1 });
      }

      localStorage.setItem('cart', JSON.stringify(cart));


      let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
      wishlist = wishlist.filter(item => item.id !== id);
      localStorage.setItem('wishlist', JSON.stringify(wishlist));

      loadWishlist();
      updateCounts();
      showNotification(' Moved to cart!');
    }

    function addAllToCart() {
      const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
      let cart = JSON.parse(localStorage.getItem('cart')) || [];

      wishlist.forEach(item => {
        const existingItem = cart.find(cartItem => cartItem.id === item.id);
        if (existingItem) {
          existingItem.quantity += 1;
        } else {
          cart.push({ ...item, quantity: 1 });
        }
      });

      localStorage.setItem('cart', JSON.stringify(cart));
      localStorage.setItem('wishlist', JSON.stringify([]));

      loadWishlist();
      updateCounts();
      showNotification(` ${wishlist.length} items added to cart!`);
    }

    function clearWishlist() {
      if (confirm('Are you sure you want to clear your entire wishlist?')) {
        localStorage.setItem('wishlist', JSON.stringify([]));
        loadWishlist();
        updateCounts();
        showNotification('🗑️ Wishlist cleared');
      }
    }

    function viewProduct(id) {
      // Reuse the product-detail page used elsewhere in the shop
      localStorage.setItem('viewProductId', id);
      window.location.href = 'product-detail.html';
    }

    function updateCounts() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
      const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
      
      document.getElementById('cartCount').textContent = cartCount;
      document.getElementById('wishlistCount').textContent = wishlist.length;
    }

    function showNotification(message) {
      const notification = document.createElement('div');
      notification.style.cssText = `
        position: fixed; top: 100px; right: 20px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: white; padding: 1rem 1.5rem; border-radius: 12px;
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3); z-index: 10000;
        animation: slideIn 0.3s ease-out; font-weight: 700;
      `;
      notification.textContent = message;
      document.body.appendChild(notification);
      setTimeout(() => notification.remove(), 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadWishlist();
      updateCounts();

      const themeBtn = document.getElementById('themeToggle');
      if (themeBtn && typeof cycleTheme === 'function') {
        themeBtn.addEventListener('click', cycleTheme);
      }

      const voiceBtn = document.getElementById('voiceBtn');
      if (voiceBtn && typeof startVoice === 'function') {
        voiceBtn.addEventListener('click', startVoice);
      }
    });


    fetch('footer.html')
      .then(response => response.text())
      .then(html => document.getElementById('footerContainer').innerHTML = html)
      .catch(error => console.log('Footer error:', error));
  </script>

  <script>
function toggleMobileMenu() {
  const navLinks = document.getElementById('navLinks');
  const hamburger = document.getElementById('hamburgerMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  
  navLinks.classList.toggle('active');
  hamburger.classList.toggle('active');
  overlay.classList.toggle('active');
  
  // Prevent body scroll when menu is open
  document.body.style.overflow = navLinks.classList.contains('active') ? 'hidden' : '';
}

function closeMobileMenu() {
  const navLinks = document.getElementById('navLinks');
  const hamburger = document.getElementById('hamburgerMenu');
  const overlay = document.getElementById('mobileMenuOverlay');
  
  navLinks.classList.remove('active');
  hamburger.classList.remove('active');
  overlay.classList.remove('active');
  document.body.style.overflow = '';
}

// Close menu when clicking on a link
document.addEventListener('DOMContentLoaded', function() {
  const navLinkElements = document.querySelectorAll('.nav-links a');
  navLinkElements.forEach(link => {
    link.addEventListener('click', closeMobileMenu);
  });
});
</script>
